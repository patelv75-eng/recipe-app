<div class="recipe-list">
  <h1>Recipes</h1>
  <p *ngIf="isLoading">Loading recipes…</p>
  <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
  <div class="recipe-grid" *ngIf="!isLoading && !errorMessage">
    <app-recipe
      *ngFor="let recipe of recipes"
      [recipe]="recipe">
    </app-recipe>
  </div>
</div>
